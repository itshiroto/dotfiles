;==========================================================

[bar/main]
width = 100%
height = 25
offset-x = 0%
offset-y = 0%
bottom = false
fixed-center = true
line-size = 2
# padding-left = 1 
background = ${color.bg}
foreground = ${color.fg}
# border-size = 8
# border-color = ${color.clear}
# radius = 8

;==========================================================

font-0 = "Fantasque Sans Mono:pixelsize=10;3"
font-1 = "Iosevka Nerd Font:pixelsize=11;3"

;==========================================================

enable-ipc = true
cursor-click = pointer

scroll-up = #i3.next
scroll-down = #i3.prev

;== Module Location ========================================================

modules-left = i3 
modules-center = title
modules-right = volume network date powermenu
 
;== Modules ========================================================

[module/title]
type = internal/xwindow
format-padding = 2
label-maxlen = 75

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

label-mode-padding = 3
label-mode-foreground = #fff
label-mode-background = #aa000000

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-background = #55ca9945
# label-focused-background = ${color.kindadark}
# label-focused-underline= #ffffff
label-focused-padding = 2px 

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-background = ${color.bg}
label-unfocused-padding = ${self.label-focused-padding}

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-background = ${self.label-focused-background}
# label-visible-underline = ${self.label-focused-underline}
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = %index%
label-urgent-background = ${color.curgent}
label-urgent-padding = ${self.label-focused-padding} 

;==========================================================

[module/mpd]
type = internal/mpd
format-online = <toggle> <label-song> 
;format-online = ’óģ <label-song> 
;alt icons = ’óģ ’óā ’óå
format-online-background = ${color.bg}
format-online-foreground = ${color.txt}
format-online-padding = 2

icon-play = ’żŗ
icon-pause = ’Żż

label-song-maxlen = 25
label-song-ellipsis = true

;==========================================================

[module/battery]
type = internal/battery
full-at = 99
time-format = %H:%M
battery = BAT1
adapter = AC
format-charging = <animation-charging> <label-charging>
format-charging-background = ${color.bg}
format-charging-padding = 2
label-charging = %percentage%%
format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${color.bg}
format-discharging-padding = 2
label-discharging = %percentage%%
format-full = <label-full>

format-full-prefix = " ’ĢĖ"
ramp-capacity-0 = ’¢Ź
ramp-capacity-1 = ’Ģ╣
ramp-capacity-2 = ’Ģ║
ramp-capacity-3 = ’Ģ╗
ramp-capacity-4 = ’ĢĮ
ramp-capacity-5 = ’ĢŠ
ramp-capacity-6 = ’Ģ┐
ramp-capacity-7 = ’¢Ć
ramp-capacity-8 = ’¢ü
ramp-capacity-9 = ’ĢĖ

ramp-capacity-0-foreground = ${color.red}
ramp-capacity-1-foreground = ${color.red}
ramp-capacity-foreground   = ${color.fg}
bar-capacity-width = 10

animation-charging-0 = ’¢ģ
animation-charging-1 = ’¢å
animation-charging-2 = ’¢ć
animation-charging-3 = ’¢ł
animation-charging-4 = ’¢ē
animation-charging-5 = ’¢Ŗ
animation-charging-6 = ’¢ä

animation-charging-framerate = 750

[module/volume]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
format-volume-padding = 2
format-volume-background = ${color.bg}
label-volume = %percentage%%
label-muted = "’¬Ć"
label-muted-background = ${color.bg}
label-muted-padding = 2

ramp-volume-0 = ’®Š
ramp-volume-1 = ’®Š
ramp-volume-2 = ’®┐
ramp-volume-3 = ’®┐
ramp-volume-4 = ’®Į
ramp-volume-5 = ’®Į
ramp-volume-6 = ’®Į

[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/check-network
format-background = ${color.bg}
format-padding = 2
click-left = bash "./rofi-wifi-menu/rofi-wifi-menu.sh" 
click-right = bash "./rofi-wifi-menu/rofi-wifi-menu.sh"
tail = true

[module/date]
type = internal/date
interval = 30
label =  %time%
label-padding-left = 2
label-padding-right = 3
label-background = ${color.bg}
time = ’É║ %H:%M 
time-alt = ’æĢ %d/%m/%Y

[module/powermenu]
type = custom/text
content = ’żż
content-padding = 2 
content-background = #55ca9945
content-foreground = #ffffff
click-left = rofi -show power-menu -modi power-menu:rofi-power-menu -font 'FiraCode NF 10' -width 20 -lines 6 -xoffset -27 -yoffset 60 -location 3  
click-right = ~/.config/polybar/scripts/sysmenu
;== EOF ========================================================
